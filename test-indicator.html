<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Scroll Indicator</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #1d1651;
      color: white;
      font-family: Arial, sans-serif;
    }
    
    #decades-container {
      border-bottom: 1px solid #118acb;
      padding-bottom: 1.5vh;
      margin-bottom: 20px;
      overflow: hidden;
      display: block;
      position: relative;
      --indicator-position: 0px;
    }
    
    /* Scroll progress indicator */
    #decades-container::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: var(--indicator-position, 0px);
      width: 80px;
      height: 6px;
      background: #b8e2de;
      border-radius: 3px;
      transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 8px rgba(184, 226, 222, 0.6);
      z-index: 100;
      display: block;
    }
    
    .decade-button {
      display: inline-block;
      margin: 0 20px;
      color: #b8e2de;
    }
    
    #data-container {
      width: 100%;
      height: 300px;
      overflow-x: auto;
      overflow-y: hidden;
      background: rgba(255,255,255,0.1);
      padding: 20px;
    }
    
    .wide-content {
      width: 3000px;
      height: 200px;
      background: linear-gradient(to right, #118acb, #b8e2de);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
  </style>
</head>
<body>
  <h1>Scroll Indicator Test</h1>
  
  <div id="decades-container">
    <span class="decade-button">1940</span>
    <span class="decade-button">1950</span>
    <span class="decade-button">1960</span>
    <span class="decade-button">1970</span>
    <span class="decade-button">1980</span>
    <span class="decade-button">1990</span>
    <span class="decade-button">2000</span>
    <span class="decade-button">2010</span>
    <span class="decade-button">2020</span>
  </div>
  
  <p>👇 Scroll horizontally in the box below 👇</p>
  <p style="color: #b8e2de;">Watch the cyan pill move above! ☝️</p>
  
  <div id="data-container">
    <div class="wide-content">
      ← Scroll me horizontally →
    </div>
  </div>
  
  <script>
    const dataContainer = document.getElementById('data-container');
    const decadeContainer = document.getElementById('decades-container');
    
    function updateIndicator() {
      const scrollLeft = dataContainer.scrollLeft;
      const scrollWidth = dataContainer.scrollWidth;
      const containerWidth = dataContainer.clientWidth;
      
      const maxScroll = scrollWidth - containerWidth;
      const scrollProgress = maxScroll > 0 ? scrollLeft / maxScroll : 0;
      
      const decadeWidth = decadeContainer.clientWidth;
      const indicatorMargin = 80;
      const indicatorPosition = scrollProgress * (decadeWidth - indicatorMargin);
      
      decadeContainer.style.setProperty('--indicator-position', `${indicatorPosition}px`);
      
      console.log('Position:', indicatorPosition, 'Progress:', (scrollProgress * 100).toFixed(1) + '%');
    }
    
    dataContainer.addEventListener('scroll', updateIndicator);
    updateIndicator();
    
    console.log('Test page loaded! Scroll the gray box horizontally.');
  </script>
</body>
</html>
